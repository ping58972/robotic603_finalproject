services:
  triton_noetic_ping:
    image: triton_noetic_ping:latest
    build:
      context: .
      dockerfile: Dockerfile
    # If you want to use the keyboard without X11 errors:
    stdin_open: true # equivalent to -i
    tty: true        # equivalent to -t      
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./catkin_ws/src:/catkin_ws/src:rw
      - ./nn_training:/nn_training:ro
    network_mode: host
    privileged: true
    devices:
      - /dev:/dev
    command: /bin/bash -lc "source /opt/ros/noetic/setup.bash && source /catkin_ws/devel/setup.bash && tail -f /dev/null"
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - ROS_IP=${ROS_IP:-192.168.1.58}
      - DISPLAY=${DISPLAY:-}
      - QT_X11_NO_MITSHM=1
